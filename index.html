<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artifakts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #1c1c1e;
  --surface2: #2a2a2d;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #f0ede8;
  --text-muted: #888480;
  --text-faint: #555250;
  --accent: #4dd6a8;
  --radius: 10px;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 40px 20px 80px;
}
.page { max-width: 880px; margin: 0 auto; }
.header { margin-bottom: 32px; }
.eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
}
.title { font-size: 32px; font-weight: 600; letter-spacing: -0.01em; }
.subtitle { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

.category { margin-bottom: 32px; }
.category-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.artifacts-grid {
  display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}
.artifact-card {
  display: block; padding: 18px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  text-decoration: none; transition: all 0.15s ease;
}
.artifact-card:hover {
  background: var(--surface2); border-color: var(--border-strong);
  transform: translateY(-1px);
}
.artifact-name { font-size: 15px; font-weight: 500; }

.empty {
  padding: 40px; text-align: center; color: var(--text-faint);
  border: 1px dashed var(--border); border-radius: var(--radius);
}
.footer {
  margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-faint); text-align: center;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="eyebrow">Gallery</div>
    <h1 class="title">Artifakts</h1>
    <p class="subtitle">A collection of one-off HTML tools and experiments.</p>
  </div>

  <div id="artifakts-root">
    <div class="empty">Loading…</div>
  </div>

  <div class="footer">Built with Claude Code</div>
</div>
<script>
(function () {
  const root = document.getElementById('artifakts-root');
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  fetch('toc.json', { cache: 'no-cache' })
    .then((r) => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then((data) => {
      const items = (data && data.artifacts) || [];
      if (!items.length) {
        root.innerHTML = '<div class="empty">No artifacts deployed yet.</div>';
        return;
      }
      const byCat = new Map();
      for (const a of items) {
        if (!byCat.has(a.category)) byCat.set(a.category, []);
        byCat.get(a.category).push(a);
      }
      root.innerHTML = [...byCat.entries()].map(([cat, arts]) => `
        <div class="category">
          <div class="category-title">${esc(cat)}</div>
          <div class="artifacts-grid">
            ${arts.map((a) => `
              <a href="relics/${esc(a.file)}" class="artifact-card">
                <div class="artifact-name">${esc(a.name)}</div>
              </a>
            `).join('')}
          </div>
        </div>
      `).join('');
    })
    .catch((err) => {
      root.innerHTML = '<div class="empty">Failed to load toc.json — ' + esc(err.message || err) + '</div>';
    });
})();
</script>
</body>
</html>
