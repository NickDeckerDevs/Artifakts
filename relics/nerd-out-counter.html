<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remington Nerd Out Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --accent-glow: rgba(124, 106, 255, 0.25);
    --text: #f0eeff;
    --muted: #8b82b0;
    --dim: #4a4470;
    --success: #34d399;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html { height: 100%; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,106,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(167,139,250,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0.9;
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 3rem;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent2);
  }

  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 2.5rem;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .ring-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 3;
  }

  .ring-progress {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 628;
    stroke-dashoffset: 628;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .ring-inner {
    position: absolute;
    inset: 16px;
    background: var(--surface);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .ring-inner.bump {
    transform: scale(1.05);
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .count-num {
    font-family: var(--display);
    font-size: 72px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.04em;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .count-num.pop {
    transform: scale(1.15);
  }

  .count-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .btn-main {
    width: 100%;
    padding: 1.1rem 1.5rem;
    font-family: var(--display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
    background: linear-gradient(135deg, var(--accent) 0%, #9d4edd 100%);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(124,106,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    margin-bottom: 12px;
  }

  .btn-main::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,106,255,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .btn-main:active { transform: scale(0.97) translateY(0); }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn-sm {
    padding: 0.7rem 1rem;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-sm:hover {
    color: var(--text);
    border-color: rgba(124,106,255,0.4);
    background: var(--surface2);
  }

  .btn-sm:active { transform: scale(0.97); }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-val {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .history-section {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: none;
  }

  .history-section.visible { display: block; }

  .history-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-transform: uppercase;
    text-align: left;
  }

  .history-list { list-style: none; }

  .history-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .history-list li:last-child { border-bottom: none; }

  .h-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    margin-right: 10px;
  }

  .h-label { color: var(--text); font-size: 13px; font-weight: 400; }
  .h-time { font-family: var(--mono); font-size: 11px; color: var(--dim); }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2);
    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 99px;
    padding: 10px 22px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--accent2);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .footer {
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
  <p class="eyebrow">Impulse Creative</p>
  <h1>Remington<br><span>Nerd Out</span> Counter</h1>

  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c6aff"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="110" cy="110" r="100"/>
      <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="100"/>
    </svg>
    <div class="ring-inner" id="ring-inner">
      <span class="count-num" id="count">0</span>
      <span class="count-label">nerd outs</span>
    </div>
  </div>

  <button class="btn-main" id="btn-nerd">⚡ Nerd Out!</button>

  <div class="btn-row">
    <button class="btn-sm" id="btn-undo">↩ Undo</button>
    <button class="btn-sm" id="btn-reset">↺ Reset</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <p class="stat-label">Session</p>
      <p class="stat-val" id="stat-session">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">All time</p>
      <p class="stat-val" id="stat-alltime">0</p>
    </div>
  </div>

  <div class="history-section" id="history-section">
    <p class="history-header">Recent nerd outs</p>
    <ul class="history-list" id="history-list"></ul>
  </div>

  <p class="footer">Persisted via localStorage &mdash; v1.0</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'remington-nerd-out';
  let sessionCount = 0;
  let state = { count: 0, allTime: 0, history: [] };

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) state = JSON.parse(raw);
    } catch(e) {}
    render();
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  }

  function timeAgo(ts) {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    return Math.floor(d / 86400) + 'd ago';
  }

  function updateRing(count) {
    const max = Math.max(count, 10);
    const frac = Math.min(count / max, 1);
    const circ = 2 * Math.PI * 100;
    const offset = circ * (1 - Math.min(frac, 0.95));
    document.getElementById('ring-progress').style.strokeDashoffset = offset;
  }

  function render() {
    document.getElementById('count').textContent = state.count;
    document.getElementById('stat-session').textContent = sessionCount;
    document.getElementById('stat-alltime').textContent = state.allTime || state.count;

    updateRing(state.count);

    const hist = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    if (state.history.length > 0) {
      hist.classList.add('visible');
      const recent = [...state.history].reverse().slice(0, 6);
      list.innerHTML = recent.map((h, i) =>
        `<li>
          <span><span class="h-num">#${state.history.length - i}</span><span class="h-label">${h.label}</span></span>
          <span class="h-time">${timeAgo(h.ts)}</span>
        </li>`
      ).join('');
    } else {
      hist.classList.remove('visible');
    }
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  const quips = [
    'Maximum nerdery achieved.', 'Remington, please.', 'There he goes again.',
    'Full nerd mode: activated.', 'Science!', 'This is peak nerd.',
    '404: chill not found.', 'Beautifully nerdy.', 'Classic Remington.',
    'The nerd out has been logged.', 'Nerd level: over 9000.', 'And another one.'
  ];

  document.getElementById('btn-nerd').addEventListener('click', () => {
    state.count++;
    state.allTime = (state.allTime || 0) + 1;
    sessionCount++;
    state.history.push({ ts: Date.now(), label: 'Nerd out' });
    save();
    render();

    const inner = document.getElementById('ring-inner');
    const num = document.getElementById('count');
    inner.classList.add('bump');
    num.classList.add('pop');
    setTimeout(() => { inner.classList.remove('bump'); num.classList.remove('pop'); }, 200);

    toast(quips[Math.floor(Math.random() * quips.length)]);
  });

  document.getElementById('btn-undo').addEventListener('click', () => {
    if (state.count === 0) { toast('Nothing to undo.'); return; }
    state.count--;
    if (sessionCount > 0) sessionCount--;
    state.history.pop();
    save();
    render();
    toast('Last nerd out removed.');
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (state.count === 0) { toast('Already at zero.'); return; }
    if (!confirm(`Reset counter from ${state.count} to zero?`)) return;
    state.count = 0;
    state.history = [];
    sessionCount = 0;
    save();
    render();
    toast('Counter reset.');
  });

  setInterval(render, 30000);
  load();
</script>
</body>
</html>
